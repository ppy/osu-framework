on:
  # 仅分支 push 触发；打 tag 推送不会重复跑 CI（tag 由 deploy-pack.yml 处理）
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:
  workflow_dispatch:
name: Continuous Integration

# 同一分支上：新 push 会取消尚未跑完的旧 CI，省额度；不同分支/PR 互不影响。
# group 必须带 github.ref，不要用全仓库共用一个 group，否则容易和卡死的 Queued run 缠在一起。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write # for reporting InspectCode issues

jobs:
  inspect-code:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET 8.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore Tools
        run: dotnet tool restore

      - name: Restore Packages
        run: dotnet restore osu-framework.Desktop.slnf

      - name: Restore inspectcode cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/inspectcode
          key: inspectcode-${{ hashFiles('.config/dotnet-tools.json', '.github/workflows/ci.yml', 'osu-framework.sln*', 'osu-framework*.slnf', '.editorconfig', '.globalconfig', 'CodeAnalysis/*', '**/*.csproj', '**/*.props') }}

      - name: Dotnet code style
        run: dotnet build -c Debug -warnaserror osu-framework.Desktop.slnf -p:EnforceCodeStyleInBuild=true

      - name: CodeFileSanity
        run: |
          # TODO: Add ignore filters and GitHub Workflow Command Reporting in CFS. That way we don't have to do this workaround.
          # FIXME: Suppress warnings from templates project
          exit_code=0
          while read -r line; do
            if [[ ! -z "$line" && "$line" != *"/osu.Framework.Templates/"* ]]; then
              echo "::error::$line"
              exit_code=1
            fi
          done <<< $(dotnet codefilesanity)
          exit $exit_code

      - name: InspectCode
        uses: JetBrains/ReSharper-InspectCode@v0.11
        with:
          # this is WTF tier but if you don't specify *both* of these the defaults assume `build: true`
          build: false
          no-build: true
          solution: ./osu-framework.Desktop.slnf
          caches-home: inspectcode
          verbosity: WARN

  test:
    name: Test
    runs-on: ${{matrix.os.fullname}}
    env:
      OSU_EXECUTION_MODE: ${{matrix.threadingMode}}
      OSU_TESTS_LOCAL_HTTPBIN: 1
    strategy:
       fail-fast: false
       matrix:
          os:
            - { prettyname: Windows, fullname: windows-latest, configuration: Debug }
            - { prettyname: macOS, fullname: macos-latest, configuration: Debug }
            - { prettyname: Linux, fullname: ubuntu-latest, configuration: Debug }
            - { prettyname: Linux, fullname: ubuntu-latest, configuration: Release }
          threadingMode: ['SingleThread', 'MultiThreaded']
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET 8.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1
          cache: false

      - name: Install httpbin
        run: go install github.com/mccutchen/go-httpbin/v2/cmd/go-httpbin@latest

      - name: Run httpbin
        run: |
          $HOME/go/bin/go-httpbin &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/status/200 >/dev/null; then
              echo "httpbin ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::httpbin did not become ready"
          exit 1
        shell: bash

      - name: Compile
        run: dotnet build -c ${{matrix.os.configuration}} -warnaserror osu-framework.Desktop.slnf

      - name: Test
        run: dotnet test $pwd/**/*.Tests/bin/${{matrix.os.configuration}}/*/*.Tests.dll --no-build --logger "trx;LogFileName=TestResults-${{matrix.os.prettyname}}-${{matrix.threadingMode}}-${{matrix.os.configuration}}.trx" -- NUnit.ConsoleOut=0
        shell: pwsh

      # Attempt to upload results even if test fails.
      # https://docs.github.com/en/actions/reference/context-and-expression-syntax-for-github-actions#always
      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: osu-framework-test-results-${{matrix.os.prettyname}}-${{matrix.threadingMode}}-${{matrix.os.configuration}}
          path: ${{github.workspace}}/TestResults/TestResults-${{matrix.os.prettyname}}-${{matrix.threadingMode}}-${{matrix.os.configuration}}.trx

  report-tests:
    name: Report test results
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    permissions:
      actions: read
      checks: write
    steps:
      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          pattern: osu-framework-test-results-*
          merge-multiple: true

      - name: Annotate test results
        uses: dorny/test-reporter@v2.6.0
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          name: Results
          path: "*.trx"
          reporter: dotnet-trx
          list-suites: 'failed'
          list-tests: 'failed'
          fail-on-error: false

  build-only-android:
    name: Build only (Android)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: 11

      - name: Install .NET 8.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET workloads
        run: dotnet workload install android

      - name: Compile
        run: dotnet build -c Debug osu-framework.Android.slnf

  build-only-ios:
    name: Build only (iOS)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET 8.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET workloads
        run: dotnet workload install ios

      # https://github.com/dotnet/macios/issues/19157
      # https://github.com/actions/runner-images/issues/12758
      - name: Use Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Compile
        run: dotnet build -c Debug osu-framework.iOS.slnf

