name: Pack and publish NuGet

on:
  push:
    tags:
      - '*-ez2lazer'
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet 包版本（与 tag 一致，例如 2026.524.4-ez2lazer）'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  pack-framework:
    name: Pack (ez2lazer.Framework)
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v6

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          dotnet pack -c Release osu.Framework `
            /p:Version=${{ steps.version.outputs.value }} `
            /p:GenerateDocumentationFile=true `
            /p:IncludeSymbols=true `
            /p:SymbolPackageFormat=snupkg `
            -o artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: ez2lazer-framework
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      # NuGet 可信发布：SK-la/osu-framework + deploy-pack.yml（无需长期 NUGET_API_KEY）
      - name: NuGet login (Trusted Publishing / OIDC)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: SK_LA

      - name: Publish packages to nuget.org
        run: |
          $version = '${{ steps.version.outputs.value }}'
          $apiKey = '${{ steps.nuget_login.outputs.NUGET_API_KEY }}'
          $log = Join-Path $env:RUNNER_TEMP 'nuget-push.log'
          $failed = $false
          Get-ChildItem artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key $apiKey `
              --source https://api.nuget.org/v3/index.json `
              2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) {
            $content = Get-Content $log -Raw
            if ($content -match 'already exists|package ID is reserved') {
              Write-Error "推送失败。若 reserved：包 ID 被保留；若 already exists：版本 $version 已存在。`nhttps://www.nuget.org/packages/ez2lazer.Framework/$version"
            }
            exit 1
          }
          Write-Host "Published (Trusted Publishing): https://www.nuget.org/packages/ez2lazer.Framework/$version"
