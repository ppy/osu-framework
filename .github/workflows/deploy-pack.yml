name: Pack and publish NuGet

on:
  push:
    tags:
      - '*-ez2lazer'
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet 包版本（与 tag 一致，例如 2026.524.4-ez2lazer）'
        required: true
        type: string

permissions:
  contents: read

jobs:
  pack-framework:
    name: Pack (ez2lazer.Framework)
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v6

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          dotnet pack -c Release osu.Framework `
            /p:Version=${{ steps.version.outputs.value }} `
            /p:GenerateDocumentationFile=true `
            /p:IncludeSymbols=true `
            /p:SymbolPackageFormat=snupkg `
            -o artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: ez2lazer-framework
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Require NUGET_API_KEY
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            Write-Error "Secret NUGET_API_KEY 未配置。请在仓库 Settings → Secrets and variables → Actions 中添加。"
            exit 1
          }

      - name: Publish packages to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $version = '${{ steps.version.outputs.value }}'
          $log = Join-Path $env:RUNNER_TEMP 'nuget-push.log'
          dotnet nuget push artifacts/*.nupkg `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            $content = Get-Content $log -Raw
            if ($content -match 'already exists|package ID is reserved') {
              Write-Error "推送失败。若 reserved：包 ID 被 nuget 保留；若 already exists：版本 $version 已存在。`nhttps://www.nuget.org/packages/ez2lazer.Framework/$version"
            }
            exit $LASTEXITCODE
          }
          Write-Host "Published: https://www.nuget.org/packages/ez2lazer.Framework/$version"
